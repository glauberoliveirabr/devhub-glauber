<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="DevHub de Glauber Oliveira — plataforma centralizada de projetos e portfólios digitais." />
  <title>DevHub · Glauber Oliveira</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="hero">
    <div class="container">
      <p class="kicker">DevHub</p>
      <h1>Glauber Oliveira</h1>
      <p class="tagline">Plataforma centralizada para exibir e gerenciar meus projetos e portfólios digitais.</p>
      <div class="links">
        <a class="btn" href="https://github.com/glauberoliveirabr" target="_blank" rel="noopener">GitHub</a>
        <a class="btn btn-outline" href="#projetos">Ver projetos</a>
      </div>
    </div>
  </header>

  <main class="container">
    <section id="projetos">
      <h2>Projetos</h2>
      <p class="section-sub">Carregados automaticamente a partir dos meus repositórios no GitHub.</p>
      <div id="estado" class="estado">Carregando projetos…</div>
      <div id="galeria" class="galeria"></div>
    </section>
  </main>

  <footer class="rodape">
    <div class="container">
      <p>© <span id="ano"></span> Glauber Oliveira · DevHub · Publicado via GitHub Pages</p>
    </div>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
